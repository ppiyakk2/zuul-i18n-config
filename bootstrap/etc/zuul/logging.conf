[loggers]
keys=root,zuul,zuul.Scheduler,zuul.GithubConnection,zuul.Pipeline,zuul.AnsibleJob,zuul.AnsibleJob.output

[handlers]
keys=console

[formatters]
keys=simple

[logger_root]
level=WARNING
handlers=console

[logger_zuul]
level=DEBUG
handlers=console
qualname=zuul
propagate=0

[logger_zuul.Scheduler]
level=DEBUG
handlers=console
qualname=zuul.Scheduler
propagate=0

[logger_zuul.GithubConnection]
level=DEBUG
handlers=console
qualname=zuul.GithubConnection
propagate=0

[logger_zuul.Pipeline]
level=DEBUG
handlers=console
qualname=zuul.Pipeline
propagate=0

[logger_zuul.AnsibleJob]
level=DEBUG
handlers=console
qualname=zuul.AnsibleJob
propagate=0

[logger_zuul.AnsibleJob.output]
level=DEBUG
handlers=console
qualname=zuul.AnsibleJob.output
propagate=0

[handler_console]
class=StreamHandler
level=DEBUG
formatter=simple
args=(sys.stdout,)

[formatter_simple]
format=%(asctime)s %(levelname)s %(name)s: %(message)s
