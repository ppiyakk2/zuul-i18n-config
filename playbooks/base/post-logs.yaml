- hosts: localhost
  connection: local
  tasks:
    - name: Create log output directory
      file:
        path: "/srv/static/logs/{{ zuul.build }}"
        state: directory
        mode: "0755"

    - name: Copy job logs to serve directory
      command: >
        cp -a {{ zuul.executor.log_root }}/. /srv/static/logs/{{ zuul.build }}/

    - name: Create gzip copies of all log files
      shell: |
        cd /srv/static/logs/{{ zuul.build }}
        for f in *; do
          [ -f "$f" ] && gzip -k "$f"
        done

    - name: Generate zuul-manifest.json
      shell: |
        python3 -c "
        import json, os, mimetypes
        log_dir = '/srv/static/logs/{{ zuul.build }}'
        tree = []
        for f in sorted(os.listdir(log_dir)):
            fpath = os.path.join(log_dir, f)
            if os.path.isfile(fpath) and not f.endswith('.gz') and f != 'zuul-manifest.json':
                mt, _ = mimetypes.guess_type(f)
                tree.append({
                    'name': f,
                    'mimetype': mt or 'text/plain',
                    'encoding': None,
                    'size': os.path.getsize(fpath)
                })
        with open(os.path.join(log_dir, 'zuul-manifest.json'), 'w') as fp:
            json.dump({'tree': tree}, fp, indent=2)
        print('Generated manifest with', len(tree), 'files')
        "

    - name: Gzip the manifest too
      command: gzip -k /srv/static/logs/{{ zuul.build }}/zuul-manifest.json

    - name: Return log URL to Zuul
      zuul_return:
        data:
          zuul:
            log_url: "http://133.186.213.132:8088/{{ zuul.build }}/"
            artifacts:
              - name: "Zuul Manifest"
                url: "http://133.186.213.132:8088/{{ zuul.build }}/zuul-manifest.json"
                metadata:
                  type: zuul_manifest
