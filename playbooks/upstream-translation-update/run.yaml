- hosts: localhost
  connection: local
  vars:
    project_src: "{{ ansible_user_dir }}/{{ zuul.project.src_dir }}"
  tasks:
    - name: Show project info
      debug:
        msg: "Processing {{ zuul.project.short_name }} on branch {{ zuul.branch }}"

    - name: Extract POT files
      include_role:
        name: extract-pot-files

    - name: Upload POT files to Weblate
      include_role:
        name: upload-to-weblate
