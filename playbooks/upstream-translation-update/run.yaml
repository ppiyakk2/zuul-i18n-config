- hosts: localhost
  connection: local
  vars:
    project_src: "{{ ansible_user_dir }}/{{ zuul.project.src_dir }}"
  tasks:
    - name: Show project info
      debug:
        msg: "Processing {{ zuul.project.short_name }} on branch {{ zuul.branch }}"

    # --- Debug: check what variables are available ---
    - name: Debug weblate vars availability
      debug:
        msg:
          - "weblate_url defined: {{ weblate_url is defined }}"
          - "weblate_token defined: {{ weblate_token is defined }}"
          - "weblate_api_credentials defined: {{ weblate_api_credentials is defined }}"

    # --- Prepare Weblate client ---
    - name: Prepare Weblate client
      include_role:
        name: prepare-weblate-client
      when: weblate_url is defined and weblate_token is defined

    - name: Verify weblate config file exists
      stat:
        path: "{{ weblate_config_path }}"
      register: weblate_config_stat
      when: weblate_url is defined and weblate_token is defined

    - name: Show weblate config file status
      debug:
        msg: "weblate config: {{ weblate_config_path }} exists={{ weblate_config_stat.stat.exists }}"
      when: weblate_url is defined and weblate_token is defined

    - name: Show weblate config url line
      command: grep "^url" {{ weblate_config_path }}
      register: weblate_config_url
      when: weblate_url is defined and weblate_token is defined

    - name: Print weblate config url line
      debug:
        msg: "{{ weblate_config_url.stdout }}"
      when: weblate_url is defined and weblate_token is defined

    # --- Extract POT files ---
    - name: Install build dependencies
      pip:
        name:
          - sphinx
          - openstackdocstheme
          - sphinx-intl
        executable: pip3
      become: true

    - name: Extract POT files via sphinx-build
      shell: |
        sphinx-build -b gettext doc/source doc/source/locale/pot/
      args:
        chdir: "{{ project_src }}"
      register: sphinx_build_result

    - name: Show sphinx-build output
      debug:
        msg: "{{ sphinx_build_result.stdout_lines }}"

    - name: Find extracted POT files
      find:
        paths: "{{ project_src }}/doc/source/locale/pot"
        patterns: "*.pot"
      register: pot_files

    - name: Show POT files
      debug:
        msg: "Extracted {{ pot_files.files | length }} POT files: {{ pot_files.files | map(attribute='path') | map('basename') | list }}"

    # --- Upload POT files to Weblate ---
    - name: Upload each POT file
      command: >
        wlc upload
        --overwrite
        --language en
        --input {{ item.path }}
        {{ weblate_component }}
      loop: "{{ pot_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      when:
        - weblate_url is defined
        - weblate_token is defined
        - weblate_component is defined

    - name: Skip Weblate upload (not configured)
      debug:
        msg: "Weblate upload skipped: weblate_url/weblate_token not configured. POT files at: {{ project_src }}/doc/source/locale/pot"
      when: weblate_url is not defined or weblate_token is not defined
