- job:
    name: base
    parent: null
    description: Base job.
    pre-run: playbooks/base/pre.yaml
    post-run: playbooks/base/post-logs.yaml
    nodeset:
      nodes:
        - name: ubuntu-noble
          label: ubuntu-noble

- job:
    name: upstream-translation-update
    parent: base
    description: |
      Extract POT files from project and upload to Weblate.
      Triggered on every merge to master.
    pre-run: playbooks/upstream-translation-update/pre.yaml
    run: playbooks/upstream-translation-update/run.yaml
    required-projects:
      - ppiyakk2/contributor-guide
    secrets:
      - name: weblate_api_credentials
        secret: weblate_api_credentials

- job:
    name: propose-translation-update
    parent: base
    description: |
      Download translations from Weblate and propose a PR
      to the project repository.
    pre-run: playbooks/propose-translation-update/pre.yaml
    run: playbooks/propose-translation-update/run.yaml
    secrets:
      - name: weblate_api_credentials
        secret: weblate_api_credentials

- job:
    name: upstream-translation-update-horizon
    parent: base
    description: |
      Extract POT files from horizon and upload to Weblate.
      Triggered on merge to master or stable/* branches.
    pre-run: playbooks/upstream-translation-update-horizon/pre.yaml
    run: playbooks/upstream-translation-update/run.yaml
    required-projects:
      - ppiyakk2/horizon
    secrets:
      - name: weblate_api_credentials
        secret: weblate_api_credentials

- job:
    name: propose-translation-update-horizon
    parent: base
    description: |
      Download translations from Weblate and propose a PR
      to the horizon repository.
    pre-run: playbooks/propose-translation-update/pre.yaml
    run: playbooks/propose-translation-update/run.yaml
    required-projects:
      - ppiyakk2/horizon
    secrets:
      - name: weblate_api_credentials
        secret: weblate_api_credentials
