---
- name: Ensure scripts directory exists
  file:
    path: '{{ ansible_user_dir }}/scripts'
    state: directory

- name: Copy translation scripts to the script dir on the node
  copy:
    dest: '{{ ansible_user_dir }}/scripts/'
    src: '{{ item }}'
    mode: "0755"
  with_items:
    - common.sh
    - common_translation_update.sh
    - weblate_utils.py
    - get-modulename.py
    - upstream_translation_update_weblate.sh
    - propose_translation_update_weblate.sh
    - upload_pot_weblate.py
