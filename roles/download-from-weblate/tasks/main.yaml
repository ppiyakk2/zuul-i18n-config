---
# Requires: prepare-weblate-client role to have been run first

- name: Skip Weblate download (weblate_url not configured)
  debug:
    msg: "Weblate download skipped: weblate_url/weblate_token not configured. Run prepare-weblate-client first."
  when: weblate_url is not defined or weblate_token is not defined

- name: Download translations from Weblate via wlc
  block:
    - name: Show download target
      debug:
        msg: "Downloading translations from {{ weblate_url }}"

    - name: Download translation files
      command: >
        wlc download
        --output {{ project_src }}/doc/source/locale/
        {{ weblate_component }}
      when: weblate_component is defined

    - name: Note if weblate_component not set
      debug:
        msg: "TODO: set weblate_component variable to specify download source (e.g. myproject/mycomponent)"
      when: weblate_component is not defined
  when: weblate_url is defined and weblate_token is defined
