---
- name: Install necessary packages
  package:
    name:
      - gettext
    state: present
  become: yes

- name: Install weblate client from pip
  pip:
    name: wlc==1.15
    state: present
    executable: pip3

- name: Ensure wlc config directory exists
  file:
    path: "{{ weblate_config_path | dirname }}"
    state: directory
    mode: "0700"

- name: Write wlc config file
  template:
    src: weblate.ini.j2
    dest: "{{ weblate_config_path }}"
    mode: "0600"
  no_log: true

- name: Ensure scripts directory exists
  file:
    path: '{{ ansible_user_dir }}/scripts'
    state: directory

- name: Copy translation scripts to the script dir on the node
  copy:
    dest: '{{ ansible_user_dir }}/scripts/'
    src: '{{ item }}'
    mode: "0755"
  with_items:
    - weblate_utils.py
    - get-modulename.py
    - upstream_translation_update_weblate.sh
    - propose_translation_update_weblate.sh
    - common_translation_update.sh
