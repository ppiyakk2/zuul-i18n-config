---
# --- Weblate client ---
- name: Install weblate client from pip
  pip:
    name: wlc==1.15
    state: present
    executable: pip3

# --- Weblate config (wlc) ---
- name: Ensure wlc config directory exists
  file:
    path: "{{ weblate_config_path | dirname }}"
    state: directory
    mode: "0700"

- name: Write wlc config file
  template:
    src: weblate.ini.j2
    dest: "{{ weblate_config_path }}"
    mode: "0600"
  no_log: true

# --- Weblate API curl config ---
- name: Write curlrc for Weblate API authentication
  copy:
    dest: "{{ ansible_user_dir }}/.curlrc"
    content: |
      header = "Authorization: Token {{ weblate_api_credentials.token }}"
    mode: "0600"
  no_log: true

# --- Translation scripts ---
- name: Ensure scripts directory exists
  file:
    path: '{{ ansible_user_dir }}/scripts'
    state: directory

- name: Copy translation scripts to the script dir on the node
  copy:
    dest: '{{ ansible_user_dir }}/scripts/'
    src: '{{ item }}'
    mode: "0755"
  with_items:
    - common.sh
    - common_translation_update.sh
    - weblate_utils.py
    - get-modulename.py
    - upstream_translation_update_weblate.sh
    - propose_translation_update_weblate.sh
    - upload_pot_weblate.py
